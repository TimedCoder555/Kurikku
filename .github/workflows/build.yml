- name: Generate Gradle Wrapper
        run: |
          cd android

          # Temporarily use a minimal settings.gradle for wrapper generation
          # (node_modules not available during wrapper init)
          cat > settings.gradle << 'EOF'
          rootProject.name = 'Kurikku'
          include ':app'
          EOF

          # Download Gradle and generate wrapper
          curl -sL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o gradle.zip
          unzip -q gradle.zip
          ./gradle-8.6/bin/gradle wrapper --gradle-version 8.6
          rm -rf gradle.zip gradle-8.6
          chmod +x gradlew

          # Restore the full settings.gradle with React Native plugin
          cat > settings.gradle << 'EOF'
          pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
          plugins { id("com.facebook.react.settings") }
          extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
              ex.autolinkLibrariesFromCommand()
          }
          rootProject.name = 'Kurikku'
          include ':app'
          EOF