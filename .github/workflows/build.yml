name: Build Kurikku APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install dependencies
        run: |
          npm install
          npm install --save-dev babel-plugin-module-resolver
          npm install @react-native-community/slider
          npm install @react-native-async-storage/async-storage

      - name: Generate Gradle Wrapper (React Native compatible)
        run: |
          cd android
          curl -L https://raw.githubusercontent.com/facebook/react-native/v0.73.6/template/android/gradlew -o gradlew
          curl -L https://raw.githubusercontent.com/facebook/react-native/v0.73.6/template/android/gradlew.bat -o gradlew.bat
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/facebook/react-native/v0.73.6/template/android/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/facebook/react-native/v0.73.6/template/android/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kurikku-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk