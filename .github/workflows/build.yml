name: Build Kurikku APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install React Native CLI
        run: npm install -g @react-native-community/cli@12

      - name: Install dependencies
        run: |
          npm install
          npm install --save-dev babel-plugin-module-resolver
          npm install @react-native-community/slider
          npm install @react-native-async-storage/async-storage

      - name: Generate missing Android wrapper files
        run: |
          mkdir -p android/gradle/wrapper
          curl -o android/gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -o android/gradlew \
            https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradlew
          chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kurikku-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk