// android/app/build.gradle
// App-level Gradle build file for Kurikku.

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.kurikku"
    compileSdkVersion 34
    buildToolsVersion "34.0.0"

    defaultConfig {
        applicationId "com.kurikku"
        minSdkVersion 26
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"

        // Required for React Native multidex support
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
            minifyEnabled false
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig true
    }

    // Exclude duplicate meta files from dependencies
    packagingOptions {
        resources {
            excludes += [
                "META-INF/DEPENDENCIES",
                "META-INF/LICENSE",
                "META-INF/LICENSE.txt",
                "META-INF/NOTICE",
                "META-INF/NOTICE.txt"
            ]
        }
    }

    // Split APK by ABI to reduce file size (optional but good practice)
    splits {
        abi {
            enable false
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
            universalApk true
        }
    }
}

dependencies {
    // ── Kotlin ────────────────────────────────────────────────
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"

    // ── AndroidX ──────────────────────────────────────────────
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.appcompat:appcompat:1.6.1"

    // ── Multidex ──────────────────────────────────────────────
    implementation "androidx.multidex:multidex:2.0.1"

    // ── React Native ──────────────────────────────────────────
    implementation "com.facebook.react:react-android:0.73.6"
    implementation "com.facebook.react:hermes-android:0.73.6"

    // ── SoLoader (required by React Native) ───────────────────
    implementation "com.facebook.soloader:soloader:0.10.5"
}